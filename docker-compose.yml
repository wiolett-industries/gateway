services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9443:9443"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgres://gateway:${DB_PASSWORD}@postgres:5432/gateway
      - REDIS_URL=redis://redis:6379
      - CLICKHOUSE_URL=${CLICKHOUSE_URL-http://clickhouse:8123}
      - CLICKHOUSE_USERNAME=${CLICKHOUSE_USERNAME:-gateway}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-gateway}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-gateway_logs}
      - CLICKHOUSE_LOGS_TABLE=${CLICKHOUSE_LOGS_TABLE:-logs}
      - CLICKHOUSE_REQUEST_TIMEOUT_MS=${CLICKHOUSE_REQUEST_TIMEOUT_MS:-5000}
      - LOGGING_INGEST_MAX_BODY_BYTES=${LOGGING_INGEST_MAX_BODY_BYTES:-1048576}
      - LOGGING_INGEST_MAX_BATCH_SIZE=${LOGGING_INGEST_MAX_BATCH_SIZE:-500}
      - LOGGING_INGEST_MAX_MESSAGE_BYTES=${LOGGING_INGEST_MAX_MESSAGE_BYTES:-16384}
      - LOGGING_INGEST_MAX_LABELS=${LOGGING_INGEST_MAX_LABELS:-32}
      - LOGGING_INGEST_MAX_FIELDS=${LOGGING_INGEST_MAX_FIELDS:-64}
      - LOGGING_INGEST_MAX_KEY_LENGTH=${LOGGING_INGEST_MAX_KEY_LENGTH:-100}
      - LOGGING_INGEST_MAX_VALUE_BYTES=${LOGGING_INGEST_MAX_VALUE_BYTES:-8192}
      - LOGGING_INGEST_MAX_JSON_DEPTH=${LOGGING_INGEST_MAX_JSON_DEPTH:-5}
      - LOGGING_RATE_LIMIT_WINDOW_SECONDS=${LOGGING_RATE_LIMIT_WINDOW_SECONDS:-60}
      - LOGGING_GLOBAL_REQUESTS_PER_WINDOW=${LOGGING_GLOBAL_REQUESTS_PER_WINDOW:-600}
      - LOGGING_GLOBAL_EVENTS_PER_WINDOW=${LOGGING_GLOBAL_EVENTS_PER_WINDOW:-60000}
      - LOGGING_TOKEN_REQUESTS_PER_WINDOW=${LOGGING_TOKEN_REQUESTS_PER_WINDOW:-300}
      - LOGGING_TOKEN_EVENTS_PER_WINDOW=${LOGGING_TOKEN_EVENTS_PER_WINDOW:-10000}
      - OIDC_ISSUER=${OIDC_ISSUER}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI}
      - OIDC_SCOPES=${OIDC_SCOPES:-openid email profile}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_EXPIRY=${SESSION_EXPIRY:-2592000}
      - APP_URL=${APP_URL}
      - PKI_MASTER_KEY=${PKI_MASTER_KEY}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-1200}
      - RATE_LIMIT_AUTH_MAX_REQUESTS=${RATE_LIMIT_AUTH_MAX_REQUESTS:-120}
      - RATE_LIMIT_AUTH_LOGIN_MAX_REQUESTS=${RATE_LIMIT_AUTH_LOGIN_MAX_REQUESTS:-20}
      - RATE_LIMIT_AUTH_CALLBACK_MAX_REQUESTS=${RATE_LIMIT_AUTH_CALLBACK_MAX_REQUESTS:-60}
      - RATE_LIMIT_SETUP_MAX_REQUESTS=${RATE_LIMIT_SETUP_MAX_REQUESTS:-20}
      - RATE_LIMIT_PUBLIC_STATUS_MAX_REQUESTS=${RATE_LIMIT_PUBLIC_STATUS_MAX_REQUESTS:-600}
      - RATE_LIMIT_PUBLIC_WEBHOOK_MAX_REQUESTS=${RATE_LIMIT_PUBLIC_WEBHOOK_MAX_REQUESTS:-60}
      - RATE_LIMIT_PKI_MAX_REQUESTS=${RATE_LIMIT_PKI_MAX_REQUESTS:-600}
      - RATE_LIMIT_STREAM_MAX_REQUESTS=${RATE_LIMIT_STREAM_MAX_REQUESTS:-120}
      - RATE_LIMIT_AI_WS_MAX_REQUESTS=${RATE_LIMIT_AI_WS_MAX_REQUESTS:-30}
      - DEFAULT_CRL_VALIDITY_HOURS=${DEFAULT_CRL_VALIDITY_HOURS:-24}
      - DEFAULT_OCSP_VALIDITY_MINUTES=${DEFAULT_OCSP_VALIDITY_MINUTES:-60}
      - EXPIRY_WARNING_DAYS=${EXPIRY_WARNING_DAYS:-30}
      - EXPIRY_CRITICAL_DAYS=${EXPIRY_CRITICAL_DAYS:-7}
      - ACME_EMAIL=${ACME_EMAIL:-admin@example.com}
      - ACME_STAGING=${ACME_STAGING:-false}
      - HEALTH_CHECK_INTERVAL_SECONDS=${HEALTH_CHECK_INTERVAL_SECONDS:-30}
      - ACME_RENEWAL_CRON=${ACME_RENEWAL_CRON:-0 3 * * *}
      - EXPIRY_CHECK_CRON=${EXPIRY_CHECK_CRON:-0 6 * * *}
      - GRPC_PORT=${GRPC_PORT:-9443}
      - GRPC_TLS_AUTO_DIR=${GRPC_TLS_AUTO_DIR:-/var/lib/gateway/tls}
      - GRPC_TLS_CERT=${GRPC_TLS_CERT:-}
      - GRPC_TLS_KEY=${GRPC_TLS_KEY:-}
      - GRPC_TLS_EXTRA_SANS=${GRPC_TLS_EXTRA_SANS:-}
      - PUBLIC_IPV4=${PUBLIC_IPV4:-}
      - PUBLIC_IPV6=${PUBLIC_IPV6:-}
      - APP_VERSION=${GATEWAY_VERSION:-dev}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gateway
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:26.2.10.10
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-gateway_logs}
      CLICKHOUSE_USER: ${CLICKHOUSE_USERNAME:-gateway}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-gateway}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user \"$${CLICKHOUSE_USER:-gateway}\" --password \"$${CLICKHOUSE_PASSWORD:-gateway}\" --query 'SELECT 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

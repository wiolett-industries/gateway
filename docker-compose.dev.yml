# Development infrastructure — postgres, redis, clickhouse
# Backend and frontend run locally via pnpm dev:all
# Nginx is managed by the daemon on the host (or skipped in dev)
#
# Usage:
#   pnpm dev:infra        # start containers
#   pnpm dev:all          # start backend + frontend
#   pnpm dev:infra:down   # stop containers

services:
  postgres:
    image: postgres:16-alpine
    container_name: gateway-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gateway
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d gateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gateway-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:26.2.10.10
    container_name: gateway-clickhouse-dev
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: gateway_logs
      CLICKHOUSE_USER: gateway
      CLICKHOUSE_PASSWORD: dev
    volumes:
      - clickhouse_dev_data:/var/lib/clickhouse
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user gateway --password dev --query 'SELECT 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_dev_data:
  redis_dev_data:
  clickhouse_dev_data:

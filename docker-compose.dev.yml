services:
  # Nginx is optional for dev — the Vite dev server proxies API calls to the backend.
  # Uncomment to test nginx configs locally:
  # nginx:
  #   image: nginx:1.27-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./nginx/html:/usr/share/nginx/html:ro
  #     - nginx_config:/etc/nginx/conf.d/sites
  #     - nginx_certs:/etc/nginx/certs
  #     - nginx_logs:/var/log/nginx
  #     - acme_challenge:/var/www/acme-challenge
  #   healthcheck:
  #     test: ["CMD-SHELL", "nginx -t && curl -f http://localhost/health || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: gateway
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d gateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

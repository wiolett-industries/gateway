# Development infrastructure — nginx, postgres, redis
# Backend and frontend run locally via pnpm dev:all
#
# Usage:
#   pnpm dev:infra        # start containers
#   pnpm dev:all          # start backend + frontend
#   pnpm dev:infra:down   # stop containers

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: gateway-nginx-1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_main_conf:/etc/nginx/conf.d
      - /tmp/gateway-nginx-config:/etc/nginx/conf.d/sites
      - /tmp/gateway-nginx-certs:/etc/nginx/certs
      - /tmp/gateway-nginx-logs:/var/log/nginx
      - /tmp/gateway-acme-challenge:/var/www/acme-challenge
    networks:
      default:
        ipv4_address: 172.18.0.4
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: gateway-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gateway
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      default:
        ipv4_address: 172.18.0.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d gateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gateway-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    networks:
      default:
        ipv4_address: 172.18.0.3
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  default:
    external: true
    name: ca-manager_default

volumes:
  nginx_main_conf:
  postgres_dev_data:
  redis_dev_data:

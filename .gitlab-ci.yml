stages:
  - test
  - build
  - sign
  - publish
  - release

variables:
  IMAGE: ${CI_REGISTRY_IMAGE}
  DOCKER_HOST: unix:///var/run/docker.sock
  PNPM_STORE_DIR: ${CI_PROJECT_DIR}/.pnpm-store
  GOCACHE: ${CI_PROJECT_DIR}/.cache/go-build
  GOMODCACHE: ${CI_PROJECT_DIR}/.cache/go-mod
  NODE_CI_IMAGE: docker.io/library/node:24@sha256:e9891237dfbb1de60ce19e9ff9fac5d73ad9c37da303ad72ff2a425ad1057e71
  DOCKER_CI_IMAGE: docker.io/library/docker:27@sha256:aa3df78ecf320f5fafdce71c659f1629e96e9de0968305fe1de670e0ca9176ce
  GOLANG_CI_IMAGE: docker.io/library/golang:1.24@sha256:d2d2bc1c84f7e60d7d2438a3836ae7d0c847f4888464e7ec9ba3a1339a1ee804
  RELEASE_CLI_IMAGE: registry.gitlab.com/gitlab-org/release-cli@sha256:3f52d526f48e8d10625c722fa6d6423ee82aadeae1b1aa91f07b62551d96dacf
  CURL_CI_IMAGE: docker.io/curlimages/curl:8.10.1@sha256:d9b4541e214bcd85196d6e92e2753ac6d0ea699f0af5741f8c6cccbfcf00ef4b

.docker-login: &docker-login
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}

.pnpm-job: &pnpm-job
  image: ${NODE_CI_IMAGE}
  before_script:
    - corepack enable
    - pnpm config set store-dir ${PNPM_STORE_DIR}
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store

.go-job: &go-job
  image: ${GOLANG_CI_IMAGE}
  before_script:
    - mkdir -p ${GOCACHE} ${GOMODCACHE}
    - cd packages/daemons
    - ../../scripts/sync-update-trust-anchor.sh
  cache:
    key:
      files:
        - packages/daemons/go.work
    paths:
      - .cache/go-build
      - .cache/go-mod

.gateway-frontend-rules: &gateway-frontend-rules
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - nx.json
        - tsconfig.json
        - packages/frontend/**/*

.gateway-backend-rules: &gateway-backend-rules
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - nx.json
        - tsconfig.json
        - packages/backend/**/*
        - config/update-trust/**/*
        - scripts/sync-update-trust-anchor.sh

.logging-sdk-rules: &logging-sdk-rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - nx.json
        - tsconfig.json
        - packages/logging-sdk/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - nx.json
        - tsconfig.json
        - packages/logging-sdk/**/*

.daemon-nginx-rules: &daemon-nginx-rules
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-nginx$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - proto/**/*
        - packages/daemons/go.work
        - packages/daemons/nginx/**/*
        - packages/daemons/shared/**/*
        - config/update-trust/**/*
        - scripts/sync-update-trust-anchor.sh

.daemon-docker-rules: &daemon-docker-rules
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-docker$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - proto/**/*
        - packages/daemons/go.work
        - packages/daemons/docker/**/*
        - packages/daemons/shared/**/*
        - config/update-trust/**/*
        - scripts/sync-update-trust-anchor.sh

.daemon-monitoring-rules: &daemon-monitoring-rules
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-monitoring$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - proto/**/*
        - packages/daemons/go.work
        - packages/daemons/monitoring/**/*
        - packages/daemons/shared/**/*
        - config/update-trust/**/*
        - scripts/sync-update-trust-anchor.sh

# ── Tests ─────────────────────────────────────────────────────────

test-frontend:
  stage: test
  extends: .pnpm-job
  script:
    - pnpm --filter frontend test
  <<: *gateway-frontend-rules

test-backend:
  stage: test
  extends: .pnpm-job
  script:
    - pnpm --filter backend test
  <<: *gateway-backend-rules

test-logging-sdk:
  stage: test
  extends: .pnpm-job
  script:
    - pnpm --filter @wiolett/gateway-logger test
    - pnpm --filter @wiolett/gateway-logger typecheck
  <<: *logging-sdk-rules

test-nginx-daemon:
  stage: test
  extends: .go-job
  script:
    - go test ./nginx/... ./shared/...
  <<: *daemon-nginx-rules

test-docker-daemon:
  stage: test
  extends: .go-job
  script:
    - go test ./docker/... ./shared/...
  <<: *daemon-docker-rules

test-monitoring-daemon:
  stage: test
  extends: .go-job
  script:
    - go test ./monitoring/... ./shared/...
  <<: *daemon-monitoring-rules

# ── Gateway (backend + frontend Docker image) ─────────────────────
# Triggered by tags like: v1.3.0

build:
  stage: build
  image: ${DOCKER_CI_IMAGE}
  needs:
    - test-frontend
    - test-backend
  <<: *docker-login
  script:
    - ./scripts/sync-update-trust-anchor.sh
    - |
      echo "Building Gateway ${CI_COMMIT_TAG}..."
      docker build \
        --tag $IMAGE:$CI_COMMIT_TAG \
        --tag $IMAGE:${CI_COMMIT_TAG#v} \
        --tag $IMAGE:latest \
        --build-arg APP_VERSION=$CI_COMMIT_TAG \
        .
    - docker push $IMAGE:$CI_COMMIT_TAG
    - echo "Pushed $IMAGE:$CI_COMMIT_TAG"
    - |
      DIGEST=$(docker buildx imagetools inspect "$IMAGE:$CI_COMMIT_TAG" --format '{{.Manifest.Digest}}')
      test -n "$DIGEST" || (echo "Could not resolve pushed gateway image digest" && exit 1)
      printf 'GATEWAY_IMAGE_DIGEST=%s\n' "$DIGEST" > gateway-image.env
  artifacts:
    reports:
      dotenv: gateway-image.env
    paths:
      - gateway-image.env
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

sign-gateway-update:
  stage: sign
  extends: .go-job
  needs:
    - job: build
      artifacts: true
  script:
    - test -n "${UPDATE_SIGNING_PRIVATE_KEY_PEM_B64}" || (echo "UPDATE_SIGNING_PRIVATE_KEY_PEM_B64 CI variable is required to publish signed gateway updates" && exit 1)
    - test -n "${GATEWAY_IMAGE_DIGEST}" || (echo "GATEWAY_IMAGE_DIGEST artifact is required to sign gateway updates" && exit 1)
    - |
      go run ./shared/cmd/update-trust sign \
        --kind gateway-image \
        --version "$CI_COMMIT_TAG" \
        --tag "$CI_COMMIT_TAG" \
        --image "$IMAGE" \
        --digest "$GATEWAY_IMAGE_DIGEST" \
        --git-commit-sha "$CI_COMMIT_SHA" \
        --git-pipeline-id "$CI_PIPELINE_ID" \
        --out ../../gateway-image.update.json
  artifacts:
    paths:
      - gateway-image.update.json
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

upload-gateway-update:
  stage: publish
  image: ${CURL_CI_IMAGE}
  needs:
    - job: sign-gateway-update
      artifacts: true
  script:
    - |
      curl \
        --fail \
        --show-error \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file gateway-image.update.json \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/gateway/${CI_COMMIT_TAG}/gateway-image.update.json"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

publish-gateway-aliases:
  stage: publish
  image: ${DOCKER_CI_IMAGE}
  needs:
    - upload-gateway-update
  <<: *docker-login
  script:
    - docker pull $IMAGE:$CI_COMMIT_TAG
    - docker tag $IMAGE:$CI_COMMIT_TAG $IMAGE:${CI_COMMIT_TAG#v}
    - docker tag $IMAGE:$CI_COMMIT_TAG $IMAGE:latest
    - docker push $IMAGE:${CI_COMMIT_TAG#v}
    - docker push $IMAGE:latest
    - echo "Pushed $IMAGE:${CI_COMMIT_TAG#v}, $IMAGE:latest after signing"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

release:
  stage: release
  image: ${RELEASE_CLI_IMAGE}
  needs:
    - upload-gateway-update
    - publish-gateway-aliases
  script:
    - echo "Creating release ${CI_COMMIT_TAG}"
    - |
      if [ -n "${CI_COMMIT_TAG_MESSAGE}" ]; then
        printf '%s\n' "${CI_COMMIT_TAG_MESSAGE}" > release-notes.md
      else
        printf 'Release %s\n' "${CI_COMMIT_TAG}" > release-notes.md
      fi
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Gateway ${CI_COMMIT_TAG}"
    description: ./release-notes.md
    assets:
      links:
        - name: gateway-image.update.json
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/gateway/${CI_COMMIT_TAG}/gateway-image.update.json"
          filepath: /gateway-image.update.json
          link_type: other
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ── Logging SDK npm package ───────────────────────────────────────

publish-logging-sdk:
  stage: release
  extends: .pnpm-job
  needs:
    - test-logging-sdk
  script:
    - test -n "${NPM_TOKEN}" || (echo "NPM_TOKEN CI variable is required to publish @wiolett/gateway-logger" && exit 1)
    - pnpm --filter @wiolett/gateway-logger build
    - printf '//registry.npmjs.org/:_authToken=%s\n' "${NPM_TOKEN}" > ~/.npmrc
    - cd packages/logging-sdk && npm publish --cache "${CI_PROJECT_DIR}/.npm" --access public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - packages/logging-sdk/**/*

# ── Daemon builds (shared template) ───────────────────────────────
# Triggered by tags like: v1.3.0-nginx, v1.3.0-docker, v1.3.0-monitoring

.build-daemon:
  stage: build
  image: ${GOLANG_CI_IMAGE}
  before_script:
    - mkdir -p ${GOCACHE} ${GOMODCACHE}
  script:
    - ./scripts/sync-update-trust-anchor.sh
    - cd packages/daemons/${DAEMON_DIR}
    - |
      VERSION=$(echo "${CI_COMMIT_TAG}" | sed "s/-${DAEMON_SUFFIX}$//")
      echo "Building ${DAEMON_NAME} ${VERSION} (tag: ${CI_COMMIT_TAG})..."
      for GOARCH in amd64 arm64; do
        echo "  → linux/${GOARCH}"
        CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build \
          -ldflags "-s -w -X ${LDFLAGS_VERSION_PKG}.Version=${VERSION}" \
          -o ../../../${DAEMON_NAME}-linux-${GOARCH} \
          ./cmd/${DAEMON_NAME}
      done
      HOST_ARCH=$(go env GOHOSTARCH)
      case "${HOST_ARCH}" in
        amd64|arm64)
          BUILT_VERSION=$(../../../${DAEMON_NAME}-linux-${HOST_ARCH} version | awk '{print $2}')
          test "${BUILT_VERSION}" = "${VERSION}" || (echo "${DAEMON_NAME} version mismatch: expected ${VERSION}, got ${BUILT_VERSION}" && exit 1)
          ;;
        *)
          echo "Skipping daemon version runtime assertion for unsupported host architecture ${HOST_ARCH}"
          ;;
      esac
    - cd ../../..
    - test -n "${UPDATE_SIGNING_PRIVATE_KEY_PEM_B64}" || (echo "UPDATE_SIGNING_PRIVATE_KEY_PEM_B64 CI variable is required to publish signed daemon updates" && exit 1)
    - |
      for GOARCH in amd64 arm64; do
        sha256sum "${DAEMON_NAME}-linux-${GOARCH}" >> checksums.txt
      done
      VERSION=$(echo "${CI_COMMIT_TAG}" | sed "s/-${DAEMON_SUFFIX}$//")
      ENCODED_PROJECT_PATH=$(printf '%s' "$CI_PROJECT_PATH" | sed 's#/#%2F#g')
      for GOARCH in amd64 arm64; do
        ARTIFACT="${DAEMON_NAME}-linux-${GOARCH}"
        SHA=$(sha256sum "${ARTIFACT}" | awk '{print $1}')
        (cd packages/daemons && go run ./shared/cmd/update-trust sign \
          --kind daemon-binary \
          --version "$VERSION" \
          --tag "$CI_COMMIT_TAG" \
          --daemon-type "$DAEMON_SUFFIX" \
          --arch "$GOARCH" \
          --artifact-name "$ARTIFACT" \
          --download-url "${CI_API_V4_URL}/projects/${ENCODED_PROJECT_PATH}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/${ARTIFACT}" \
          --sha256 "$SHA" \
          --git-commit-sha "$CI_COMMIT_SHA" \
          --git-pipeline-id "$CI_PIPELINE_ID" \
          --out "../../${ARTIFACT}.update.json")
      done
      unset UPDATE_SIGNING_PRIVATE_KEY_PEM_B64
    - |
      for GOARCH in amd64 arm64; do
        echo "Uploading ${DAEMON_NAME}-linux-${GOARCH} to package registry..."
        curl --fail --show-error \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "${DAEMON_NAME}-linux-${GOARCH}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/${DAEMON_NAME}-linux-${GOARCH}"
      done
      curl --fail --show-error \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file checksums.txt \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/checksums.txt"
      for GOARCH in amd64 arm64; do
        ARTIFACT="${DAEMON_NAME}-linux-${GOARCH}"
        curl --fail --show-error \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "${ARTIFACT}.update.json" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/${ARTIFACT}.update.json"
      done
  cache:
    key:
      files:
        - packages/daemons/go.work
    paths:
      - .cache/go-build
      - .cache/go-mod
  artifacts:
    paths:
      - checksums.txt
      - "*-daemon-linux-*.update.json"
    expire_in: 1 hour

.release-daemon:
  stage: release
  image: ${RELEASE_CLI_IMAGE}
  script:
    - echo "Creating release for ${DAEMON_NAME} ${CI_COMMIT_TAG}"
    - |
      if [ -n "${CI_COMMIT_TAG_MESSAGE}" ]; then
        printf '%s\n' "${CI_COMMIT_TAG_MESSAGE}" > release-notes.md
      else
        printf 'Release %s\n' "${CI_COMMIT_TAG}" > release-notes.md
      fi
  release:
    tag_name: $CI_COMMIT_TAG
    name: "${DAEMON_LABEL} ${CI_COMMIT_TAG}"
    description: ./release-notes.md
    assets:
      links:
        - name: "${DAEMON_NAME}-linux-amd64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/${DAEMON_NAME}-linux-amd64"
          filepath: /${DAEMON_NAME}-linux-amd64
          link_type: package
        - name: "${DAEMON_NAME}-linux-arm64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/${DAEMON_NAME}-linux-arm64"
          filepath: /${DAEMON_NAME}-linux-arm64
          link_type: package
        - name: checksums.txt
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/checksums.txt"
          filepath: /checksums.txt
          link_type: other
        - name: "${DAEMON_NAME}-linux-amd64.update.json"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/${DAEMON_NAME}-linux-amd64.update.json"
          filepath: /${DAEMON_NAME}-linux-amd64.update.json
          link_type: other
        - name: "${DAEMON_NAME}-linux-arm64.update.json"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/${DAEMON_NAME}-linux-arm64.update.json"
          filepath: /${DAEMON_NAME}-linux-arm64.update.json
          link_type: other

# ── nginx-daemon ──────────────────────────────────────────────────

build-nginx-daemon:
  extends: .build-daemon
  needs:
    - test-nginx-daemon
  variables:
    DAEMON_DIR: nginx
    DAEMON_NAME: nginx-daemon
    DAEMON_SUFFIX: nginx
    LDFLAGS_VERSION_PKG: github.com/wiolett-industries/gateway/nginx-daemon/internal/daemon
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-nginx$/

release-nginx-daemon:
  extends: .release-daemon
  needs:
    - build-nginx-daemon
  variables:
    DAEMON_NAME: nginx-daemon
    DAEMON_LABEL: "Nginx Daemon"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-nginx$/

# ── docker-daemon ─────────────────────────────────────────────────

build-docker-daemon:
  extends: .build-daemon
  needs:
    - test-docker-daemon
  variables:
    DAEMON_DIR: docker
    DAEMON_NAME: docker-daemon
    DAEMON_SUFFIX: docker
    LDFLAGS_VERSION_PKG: main
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-docker$/

release-docker-daemon:
  extends: .release-daemon
  needs:
    - build-docker-daemon
  variables:
    DAEMON_NAME: docker-daemon
    DAEMON_LABEL: "Docker Daemon"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-docker$/

# ── monitoring-daemon ─────────────────────────────────────────────

build-monitoring-daemon:
  extends: .build-daemon
  needs:
    - test-monitoring-daemon
  variables:
    DAEMON_DIR: monitoring
    DAEMON_NAME: monitoring-daemon
    DAEMON_SUFFIX: monitoring
    LDFLAGS_VERSION_PKG: main
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-monitoring$/

release-monitoring-daemon:
  extends: .release-daemon
  needs:
    - build-monitoring-daemon
  variables:
    DAEMON_NAME: monitoring-daemon
    DAEMON_LABEL: "Monitoring Daemon"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-monitoring$/

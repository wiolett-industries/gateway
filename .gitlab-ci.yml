stages:
  - test
  - build
  - release

variables:
  IMAGE: ${CI_REGISTRY_IMAGE}
  DOCKER_HOST: unix:///var/run/docker.sock
  PNPM_STORE_DIR: ${CI_PROJECT_DIR}/.pnpm-store
  GOCACHE: ${CI_PROJECT_DIR}/.cache/go-build
  GOMODCACHE: ${CI_PROJECT_DIR}/.cache/go-mod

.docker-login: &docker-login
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}

.pnpm-job: &pnpm-job
  image: node:24
  before_script:
    - corepack enable
    - pnpm config set store-dir ${PNPM_STORE_DIR}
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store

.go-job: &go-job
  image: golang:1.24
  before_script:
    - mkdir -p ${GOCACHE} ${GOMODCACHE}
    - cd packages/daemons
  cache:
    key:
      files:
        - packages/daemons/go.work
    paths:
      - .cache/go-build
      - .cache/go-mod

.gateway-frontend-rules: &gateway-frontend-rules
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - nx.json
        - tsconfig.json
        - packages/frontend/**/*

.gateway-backend-rules: &gateway-backend-rules
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - nx.json
        - tsconfig.json
        - packages/backend/**/*

.daemon-nginx-rules: &daemon-nginx-rules
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-nginx$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - proto/**/*
        - packages/daemons/go.work
        - packages/daemons/nginx/**/*
        - packages/daemons/shared/**/*

.daemon-docker-rules: &daemon-docker-rules
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-docker$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - proto/**/*
        - packages/daemons/go.work
        - packages/daemons/docker/**/*
        - packages/daemons/shared/**/*

.daemon-monitoring-rules: &daemon-monitoring-rules
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-monitoring$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - proto/**/*
        - packages/daemons/go.work
        - packages/daemons/monitoring/**/*
        - packages/daemons/shared/**/*

# ── Tests ─────────────────────────────────────────────────────────

test-frontend:
  stage: test
  extends: .pnpm-job
  script:
    - pnpm --filter frontend test
  <<: *gateway-frontend-rules

test-backend:
  stage: test
  extends: .pnpm-job
  script:
    - pnpm --filter backend test
  <<: *gateway-backend-rules

test-nginx-daemon:
  stage: test
  extends: .go-job
  script:
    - go test ./nginx/... ./shared/...
  <<: *daemon-nginx-rules

test-docker-daemon:
  stage: test
  extends: .go-job
  script:
    - go test ./docker/... ./shared/...
  <<: *daemon-docker-rules

test-monitoring-daemon:
  stage: test
  extends: .go-job
  script:
    - go test ./monitoring/... ./shared/...
  <<: *daemon-monitoring-rules

# ── Gateway (backend + frontend Docker image) ─────────────────────
# Triggered by tags like: v1.3.0

build:
  stage: build
  image: docker:27
  needs:
    - test-frontend
    - test-backend
  <<: *docker-login
  script:
    - |
      echo "Building Gateway ${CI_COMMIT_TAG}..."
      docker build \
        --cache-from $IMAGE:latest \
        --tag $IMAGE:$CI_COMMIT_TAG \
        --tag $IMAGE:${CI_COMMIT_TAG#v} \
        --tag $IMAGE:latest \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --build-arg APP_VERSION=$CI_COMMIT_TAG \
        .
    - docker push $IMAGE:$CI_COMMIT_TAG
    - docker push $IMAGE:${CI_COMMIT_TAG#v}
    - docker push $IMAGE:latest
    - echo "Pushed $IMAGE:$CI_COMMIT_TAG, $IMAGE:${CI_COMMIT_TAG#v}, $IMAGE:latest"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build
  script:
    - echo "Creating release ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Gateway ${CI_COMMIT_TAG}"
    description: "Release ${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# ── Daemon builds (shared template) ───────────────────────────────
# Triggered by tags like: v1.3.0-nginx, v1.3.0-docker, v1.3.0-monitoring

.build-daemon:
  stage: build
  image: golang:1.24
  before_script:
    - mkdir -p ${GOCACHE} ${GOMODCACHE}
  script:
    - cd packages/daemons/${DAEMON_DIR}
    - |
      VERSION=$(echo "${CI_COMMIT_TAG}" | sed "s/-${DAEMON_SUFFIX}$//")
      echo "Building ${DAEMON_NAME} ${VERSION} (tag: ${CI_COMMIT_TAG})..."
      for GOARCH in amd64 arm64; do
        echo "  → linux/${GOARCH}"
        CGO_ENABLED=0 GOOS=linux GOARCH=${GOARCH} go build \
          -ldflags "-s -w -X ${LDFLAGS_VERSION_PKG}.Version=${VERSION}" \
          -o ../../../${DAEMON_NAME}-linux-${GOARCH} \
          ./cmd/${DAEMON_NAME}
      done
    - cd ../../..
    - |
      for GOARCH in amd64 arm64; do
        echo "Uploading ${DAEMON_NAME}-linux-${GOARCH} to package registry..."
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "${DAEMON_NAME}-linux-${GOARCH}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/${DAEMON_NAME}-linux-${GOARCH}"
      done
    - |
      for GOARCH in amd64 arm64; do
        sha256sum "${DAEMON_NAME}-linux-${GOARCH}" >> checksums.txt
      done
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file checksums.txt \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/checksums.txt"
  cache:
    key:
      files:
        - packages/daemons/go.work
    paths:
      - .cache/go-build
      - .cache/go-mod
  artifacts:
    paths:
      - checksums.txt
    expire_in: 1 hour

.release-daemon:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release for ${DAEMON_NAME} ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "${DAEMON_LABEL} ${CI_COMMIT_TAG}"
    description: "Release ${DAEMON_NAME} ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: "${DAEMON_NAME}-linux-amd64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/${DAEMON_NAME}-linux-amd64"
          filepath: /${DAEMON_NAME}-linux-amd64
          link_type: package
        - name: "${DAEMON_NAME}-linux-arm64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/${DAEMON_NAME}-linux-arm64"
          filepath: /${DAEMON_NAME}-linux-arm64
          link_type: package
        - name: checksums.txt
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${DAEMON_NAME}/${CI_COMMIT_TAG}/checksums.txt"
          filepath: /checksums.txt
          link_type: other

# ── nginx-daemon ──────────────────────────────────────────────────

build-nginx-daemon:
  extends: .build-daemon
  needs:
    - test-nginx-daemon
  variables:
    DAEMON_DIR: nginx
    DAEMON_NAME: nginx-daemon
    DAEMON_SUFFIX: nginx
    LDFLAGS_VERSION_PKG: github.com/wiolett/gateway/nginx-daemon/internal/daemon
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-nginx$/

release-nginx-daemon:
  extends: .release-daemon
  needs:
    - build-nginx-daemon
  variables:
    DAEMON_NAME: nginx-daemon
    DAEMON_LABEL: "Nginx Daemon"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-nginx$/

# ── docker-daemon ─────────────────────────────────────────────────

build-docker-daemon:
  extends: .build-daemon
  needs:
    - test-docker-daemon
  variables:
    DAEMON_DIR: docker
    DAEMON_NAME: docker-daemon
    DAEMON_SUFFIX: docker
    LDFLAGS_VERSION_PKG: main
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-docker$/

release-docker-daemon:
  extends: .release-daemon
  needs:
    - build-docker-daemon
  variables:
    DAEMON_NAME: docker-daemon
    DAEMON_LABEL: "Docker Daemon"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-docker$/

# ── monitoring-daemon ─────────────────────────────────────────────

build-monitoring-daemon:
  extends: .build-daemon
  needs:
    - test-monitoring-daemon
  variables:
    DAEMON_DIR: monitoring
    DAEMON_NAME: monitoring-daemon
    DAEMON_SUFFIX: monitoring
    LDFLAGS_VERSION_PKG: main
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-monitoring$/

release-monitoring-daemon:
  extends: .release-daemon
  needs:
    - build-monitoring-daemon
  variables:
    DAEMON_NAME: monitoring-daemon
    DAEMON_LABEL: "Monitoring Daemon"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-monitoring$/

gateway:
  address: "gateway.example.com:9443"
  # token: "gw_node_..." # Set during install, cleared after enrollment
tls:
  ca_cert: "/etc/docker-daemon/certs/ca.pem"
  client_cert: "/etc/docker-daemon/certs/node.pem"
  client_key: "/etc/docker-daemon/certs/node-key.pem"
state_dir: "/var/lib/docker-daemon"
log_level: "info"

console:
  user: ""  # OS user for host console sessions; empty = daemon's user

docker:
  socket: "unix:///var/run/docker.sock"
  allowlist: ["*"]  # "*" = all containers, or explicit names

syntax = "proto3";
package gateway.v1;

option go_package = "github.com/wiolett/gateway/daemon-shared/gatewayv1";

// ─── Node Enrollment ────────────────────────────────────────────────

service NodeEnrollment {
  // Initial enrollment: daemon presents PSK token, receives mTLS certs
  rpc Enroll(EnrollRequest) returns (EnrollResponse);

  // Certificate renewal: daemon presents current cert, gets new one
  rpc RenewCertificate(RenewCertRequest) returns (RenewCertResponse);
}

message EnrollRequest {
  string token = 1;
  string hostname = 2;
  string nginx_version = 3;
  string os_info = 4;
  string daemon_version = 5;
  string daemon_type = 6;     // "nginx", "monitoring", etc.
}

message EnrollResponse {
  string node_id = 1;
  bytes ca_certificate = 2;
  bytes client_certificate = 3;
  bytes client_key = 4;
  int64 cert_expires_at = 5;
}

message RenewCertRequest {
  string node_id = 1;
}

message RenewCertResponse {
  bytes client_certificate = 1;
  bytes client_key = 2;
  int64 cert_expires_at = 3;
}

// ─── Main Control Channel ───────────────────────────────────────────

service NodeControl {
  // Bidirectional stream: daemon connects, Gateway pushes commands
  rpc CommandStream(stream DaemonMessage) returns (stream GatewayCommand);
}

// Messages FROM daemon TO Gateway
message DaemonMessage {
  oneof payload {
    RegisterMessage register = 1;
    CommandResult command_result = 2;
    HealthReport health_report = 3;
    StatsReport stats_report = 4;
    DaemonLogEntry daemon_log = 5;
    ExecOutput exec_output = 6;
  }
}

// Daemon's own operational logs (startup, connections, errors, command execution)
message DaemonLogEntry {
  string timestamp = 1;
  string level = 2;
  string message = 3;
  string component = 4;
  map<string, string> fields = 5;
}

message RegisterMessage {
  string node_id = 1;
  string hostname = 2;
  string nginx_version = 3;
  string config_version_hash = 4;
  string daemon_version = 5;
  int64 nginx_uptime_seconds = 6;
  bool nginx_running = 7;
  // Static system info
  string cpu_model = 8;
  int32 cpu_cores = 9;
  string architecture = 10;
  string kernel_version = 11;
  string daemon_type = 12;       // "nginx", "monitoring", etc.
}

message CommandResult {
  string command_id = 1;
  bool success = 2;
  string error = 3;
  string detail = 4;
}

message HealthReport {
  bool nginx_running = 1;
  bool config_valid = 2;
  int64 nginx_uptime_seconds = 3;
  int32 worker_count = 4;
  string nginx_version = 5;
  double cpu_percent = 6;
  int64 memory_bytes = 7;
  int64 disk_free_bytes = 8;
  int64 timestamp = 9;
  // System
  double load_average_1m = 10;
  double load_average_5m = 11;
  double load_average_15m = 12;
  int64 system_memory_total_bytes = 13;
  int64 system_memory_used_bytes = 14;
  int64 system_memory_available_bytes = 15;
  int64 swap_total_bytes = 16;
  int64 swap_used_bytes = 17;
  int64 system_uptime_seconds = 18;
  int64 open_file_descriptors = 19;
  int64 max_file_descriptors = 20;
  // Disk
  repeated DiskMount disk_mounts = 21;
  int64 disk_read_bytes = 22;
  int64 disk_write_bytes = 23;
  // Network
  repeated NetworkInterface network_interfaces = 24;
  // Nginx
  int64 nginx_rss_bytes = 25;
  double error_rate_4xx = 26;
  double error_rate_5xx = 27;
  // Docker
  repeated ContainerStats container_stats = 28;
  string docker_version = 29;
  int32 containers_running = 30;
  int32 containers_stopped = 31;
  int32 containers_total = 32;
}

message StatsReport {
  int64 active_connections = 1;
  int64 accepts = 2;
  int64 handled = 3;
  int64 requests = 4;
  int32 reading = 5;
  int32 writing = 6;
  int32 waiting = 7;
  int64 timestamp = 8;
}

message DiskMount {
  string mount_point = 1;
  string filesystem = 2;
  string device = 3;
  int64 total_bytes = 4;
  int64 used_bytes = 5;
  int64 free_bytes = 6;
  double usage_percent = 7;
}

message NetworkInterface {
  string name = 1;
  int64 rx_bytes = 2;
  int64 tx_bytes = 3;
  int64 rx_packets = 4;
  int64 tx_packets = 5;
  int64 rx_errors = 6;
  int64 tx_errors = 7;
}

// Messages FROM Gateway TO daemon
message GatewayCommand {
  string command_id = 1;
  oneof payload {
    ApplyConfigCommand apply_config = 2;
    RemoveConfigCommand remove_config = 3;
    DeployCertCommand deploy_cert = 4;
    RemoveCertCommand remove_cert = 5;
    FullSyncCommand full_sync = 6;
    UpdateGlobalConfigCommand update_global_config = 7;
    DeployHtpasswdCommand deploy_htpasswd = 8;
    TestConfigCommand test_config = 9;
    RequestHealthCommand request_health = 10;
    RequestStatsCommand request_stats = 11;
    SetDaemonLogStreamCommand set_daemon_log_stream = 12;
    RemoveHtpasswdCommand remove_htpasswd = 13;
    DeployAcmeChallengeCommand deploy_acme_challenge = 14;
    RemoveAcmeChallengeCommand remove_acme_challenge = 15;
    ReadGlobalConfigCommand read_global_config = 16;
    RequestTrafficStatsCommand request_traffic_stats = 17;
    DockerContainerCommand docker_container = 18;
    DockerImageCommand docker_image = 19;
    DockerVolumeCommand docker_volume = 20;
    DockerNetworkCommand docker_network = 21;
    DockerExecCommand docker_exec = 22;
    DockerFileCommand docker_file = 23;
    DockerConfigPushCommand docker_config_push = 24;
    DockerLogsCommand docker_logs = 25;
    ExecInput exec_input = 26;
    NodeExecCommand node_exec = 27;
    UpdateDaemonCommand update_daemon = 28;
  }
}

message NodeExecCommand {
  string action = 1;          // "create", "resize"
  repeated string command = 2; // shell override (default: auto-detect)
  bool tty = 3;
  int32 rows = 4;
  int32 cols = 5;
}

message ApplyConfigCommand {
  string host_id = 1;
  string config_content = 2;
  bool test_only = 3;
}

// Daemon also cleans up associated cache directory on removal
message RemoveConfigCommand {
  string host_id = 1;
}

// Cert deployment does NOT auto-reload nginx. Gateway sends a separate
// ApplyConfigCommand or TestConfigCommand + reload when ready.
message DeployCertCommand {
  string cert_id = 1;
  bytes cert_pem = 2;
  bytes key_pem = 3;
  bytes chain_pem = 4;
}

message RemoveCertCommand {
  string cert_id = 1;
}

message FullSyncCommand {
  repeated HostConfig hosts = 1;
  repeated CertBundle certs = 2;
  string global_config = 3;
  repeated HtpasswdFile htpasswd_files = 4;
  string version_hash = 5;
}

message HostConfig {
  string host_id = 1;
  string config_content = 2;
}

message CertBundle {
  string cert_id = 1;
  bytes cert_pem = 2;
  bytes key_pem = 3;
  bytes chain_pem = 4;
}

message HtpasswdFile {
  string access_list_id = 1;
  string content = 2;
}

message UpdateGlobalConfigCommand {
  string content = 1;
  string backup_content = 2;
}

message DeployHtpasswdCommand {
  string access_list_id = 1;
  string content = 2;
}

message RemoveHtpasswdCommand {
  string access_list_id = 1;
}

message TestConfigCommand {}
message RequestHealthCommand {}
message RequestStatsCommand {}

// Controls daemon log streaming over the command channel
message SetDaemonLogStreamCommand {
  bool enabled = 1;
  string min_level = 2;
  int32 tail_lines = 3;
}

// ACME HTTP-01 challenge file management
message DeployAcmeChallengeCommand {
  string token = 1;
  string content = 2;
}

message RemoveAcmeChallengeCommand {
  string token = 1;
}

// Read the current global nginx.conf — response content is in CommandResult.detail
message ReadGlobalConfigCommand {}

// Request traffic stats from daemon log parsing — response JSON is in CommandResult.detail
message RequestTrafficStatsCommand {
  int32 tail_lines = 1; // Number of recent log lines to analyze (default 200)
}

// ─── Docker Commands ────────────────────────────────────────────────

message DockerContainerCommand {
  string action = 1;
  string container_id = 2;
  string config_json = 3;
  int32 timeout_seconds = 4;
  string signal = 5;
  string new_name = 6;
  bool force = 7;
}

message DockerImageCommand {
  string action = 1;
  string image_ref = 2;
  string registry_auth_json = 3;
  bool force = 4;
}

message DockerVolumeCommand {
  string action = 1;
  string name = 2;
  string driver = 3;
  map<string, string> labels = 4;
  bool force = 5;
}

message DockerNetworkCommand {
  string action = 1;
  string network_id = 2;
  string container_id = 3;
  string driver = 4;
  string subnet = 5;
  string gateway_addr = 6;
}

message DockerExecCommand {
  string action = 1;
  string container_id = 2;
  repeated string command = 3;
  bool tty = 4;
  bool stdin = 5;
  int32 rows = 6;
  int32 cols = 7;
}

message DockerFileCommand {
  string action = 1;
  string container_id = 2;
  string path = 3;
  int64 max_bytes = 4;
  bytes content = 5;
}

message DockerConfigPushCommand {
  repeated RegistryConfig registries = 1;
  repeated string allowlist = 2;
}

message RegistryConfig {
  string url = 1;
  string username = 2;
  string password = 3;
}

message DockerLogsCommand {
  string container_id = 1;
  int32 tail_lines = 2;
  bool follow = 3;
  bool timestamps = 4;
  string since = 5;    // RFC3339 timestamp
  string until = 6;    // RFC3339 timestamp
}

message ExecInput {
  string exec_id = 1;
  bytes data = 2;
}

message ExecOutput {
  string exec_id = 1;
  bytes data = 2;
  bool exited = 3;
  int32 exit_code = 4;
}

message ContainerStats {
  string container_id = 1;
  string name = 2;
  string image = 3;
  string state = 4;
  double cpu_percent = 5;
  int64 memory_usage_bytes = 6;
  int64 memory_limit_bytes = 7;
  int64 network_rx_bytes = 8;
  int64 network_tx_bytes = 9;
  int64 block_read_bytes = 10;
  int64 block_write_bytes = 11;
  int64 pids = 12;
}

// ─── Log Streaming ──────────────────────────────────────────────────

service LogStream {
  // Daemon streams log entries to Gateway
  rpc StreamLogs(stream LogStreamMessage) returns (stream LogStreamControl);
}

message LogStreamMessage {
  oneof payload {
    LogSubscribeAck subscribe_ack = 1;
    LogEntry entry = 2;
  }
}

message LogSubscribeAck {
  string host_id = 1;
}

message LogEntry {
  string host_id = 1;
  string timestamp = 2;
  string remote_addr = 3;
  string method = 4;
  string path = 5;
  int32 status = 6;
  int64 body_bytes_sent = 7;
  string referer = 8;
  string user_agent = 9;
  string upstream_response_time = 10;
  string raw = 11;
  string log_type = 12; // "access" or "error"
  string level = 13;    // for error logs: "error", "warn", "crit", etc.
}

message LogStreamControl {
  oneof payload {
    LogSubscribe subscribe = 1;
    LogUnsubscribe unsubscribe = 2;
  }
}

message LogSubscribe {
  string host_id = 1;
  int32 tail_lines = 2;
}

message LogUnsubscribe {
  string host_id = 1;
}

message UpdateDaemonCommand {
  string download_url = 1;
  string target_version = 2;
  string checksum = 3;        // sha256 of the binary
}

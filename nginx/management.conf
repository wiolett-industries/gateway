# management.conf -- Serves the Gateway management UI and proxies API routes
# to the backend application container.
#
# Usage:
#   In production, place the built frontend files (from `pnpm build` in
#   packages/frontend) into /usr/share/nginx/frontend on the nginx container.
#   This is optional -- the backend can serve static files directly, and in
#   development the Vite dev server handles everything.

upstream gateway_app {
    server app:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name ${MANAGEMENT_DOMAIN};

    root /usr/share/nginx/frontend;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── ACME challenges (Let's Encrypt) ───────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
        try_files $uri =404;
    }

    # ── API / auth / PKI -- proxy to backend ──────────────────────────
    location /api/ {
        proxy_pass http://gateway_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE support for live log streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location /auth/ {
        proxy_pass http://gateway_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /pki/ {
        proxy_pass http://gateway_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /health {
        proxy_pass http://gateway_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    location = /docs {
        proxy_pass http://gateway_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /openapi.json {
        proxy_pass http://gateway_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Frontend SPA -- serve static files with fallback ──────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
